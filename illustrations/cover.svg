<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f3eb"/>
      <stop offset="100%" stop-color="#e8e2d0"/>
    </linearGradient>
    <linearGradient id="finger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8c84a"/>
      <stop offset="100%" stop-color="#6b8932"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="360" fill="url(#bg)"/>

  <!-- Central stalk -->
  <path d="M 300 30 C 295 100, 305 180, 300 260 C 295 320, 305 340, 300 340"
        stroke="#5d4a2e" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Hand 1 (top, smallest) -->
  <g transform="translate(300,80)">
    <ellipse cx="-40" cy="0" rx="14" ry="38" fill="url(#finger)" transform="rotate(-20)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-20" cy="-5" rx="15" ry="42" fill="url(#finger)" transform="rotate(-8)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-8" rx="16" ry="46" fill="url(#finger)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="20" cy="-5" rx="15" ry="42" fill="url(#finger)" transform="rotate(8)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="40" cy="0" rx="14" ry="38" fill="url(#finger)" transform="rotate(20)" stroke="#3e5a1f" stroke-width="1.5"/>
  </g>

  <!-- Hand 2 -->
  <g transform="translate(300,135)">
    <ellipse cx="-65" cy="5" rx="16" ry="48" fill="url(#finger)" transform="rotate(-25)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-40" cy="0" rx="17" ry="52" fill="url(#finger)" transform="rotate(-12)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-15" cy="-5" rx="18" ry="56" fill="url(#finger)" transform="rotate(-4)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="10" cy="-5" rx="18" ry="56" fill="url(#finger)" transform="rotate(4)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="35" cy="0" rx="17" ry="52" fill="url(#finger)" transform="rotate(12)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="60" cy="5" rx="16" ry="48" fill="url(#finger)" transform="rotate(25)" stroke="#3e5a1f" stroke-width="1.5"/>
  </g>

  <!-- Hand 3 (largest, middle) -->
  <g transform="translate(300,205)">
    <ellipse cx="-95" cy="10" rx="18" ry="58" fill="url(#finger)" transform="rotate(-28)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-65" cy="3" rx="19" ry="62" fill="url(#finger)" transform="rotate(-15)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-35" cy="-3" rx="20" ry="66" fill="url(#finger)" transform="rotate(-6)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-5" cy="-5" rx="20" ry="68" fill="url(#finger)" transform="rotate(-2)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="25" cy="-5" rx="20" ry="68" fill="url(#finger)" transform="rotate(2)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="55" cy="-3" rx="20" ry="66" fill="url(#finger)" transform="rotate(6)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="85" cy="3" rx="19" ry="62" fill="url(#finger)" transform="rotate(15)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="115" cy="10" rx="18" ry="58" fill="url(#finger)" transform="rotate(28)" stroke="#3e5a1f" stroke-width="1.5"/>
  </g>

  <!-- Hand 4 -->
  <g transform="translate(300,275)">
    <ellipse cx="-70" cy="8" rx="17" ry="52" fill="url(#finger)" transform="rotate(-25)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-45" cy="2" rx="18" ry="55" fill="url(#finger)" transform="rotate(-12)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-20" cy="-2" rx="19" ry="58" fill="url(#finger)" transform="rotate(-4)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="5" cy="-2" rx="19" ry="58" fill="url(#finger)" transform="rotate(4)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="30" cy="2" rx="18" ry="55" fill="url(#finger)" transform="rotate(12)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="55" cy="8" rx="17" ry="52" fill="url(#finger)" transform="rotate(25)" stroke="#3e5a1f" stroke-width="1.5"/>
  </g>

  <!-- Hand 5 -->
  <g transform="translate(300,335)">
    <ellipse cx="-50" cy="5" rx="15" ry="42" fill="url(#finger)" transform="rotate(-22)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="-25" cy="0" rx="16" ry="46" fill="url(#finger)" transform="rotate(-8)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-3" rx="17" ry="48" fill="url(#finger)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="25" cy="0" rx="16" ry="46" fill="url(#finger)" transform="rotate(8)" stroke="#3e5a1f" stroke-width="1.5"/>
    <ellipse cx="50" cy="5" rx="15" ry="42" fill="url(#finger)" transform="rotate(22)" stroke="#3e5a1f" stroke-width="1.5"/>
  </g>

  <!-- Title text -->
  <text x="300" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5d4a2e" font-style="italic" font-weight="bold">PLANTAGO</text>
</svg>