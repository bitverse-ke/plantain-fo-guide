<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .title { font-family: Georgia, serif; font-size: 14px; font-weight: bold; fill: #3e5a1f; }
      .stage { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #5d4a2e; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 9px; fill: #5d4a2e; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" class="title">DEFECT CATALOG — IDENTIFY &amp; CLASSIFY</text>

  <!-- ============ Row 1 ============ -->

  <!-- 1. Black Sigatoka -->
  <g transform="translate(20,50)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <!-- Plantain finger -->
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <!-- Sigatoka spots -->
    <g fill="#3a2810">
      <ellipse cx="75" cy="100" rx="6" ry="3" transform="rotate(20 75 100)"/>
      <ellipse cx="90" cy="115" rx="8" ry="4" transform="rotate(-15 90 115)"/>
      <ellipse cx="115" cy="105" rx="5" ry="3" transform="rotate(30 115 105)"/>
      <ellipse cx="130" cy="118" rx="7" ry="3" transform="rotate(-10 130 118)"/>
      <ellipse cx="105" cy="100" rx="4" ry="2" transform="rotate(45 105 100)"/>
    </g>
    <text x="100" y="155" text-anchor="middle" class="stage">BLACK SIGATOKA</text>
    <text x="100" y="175" text-anchor="middle" class="label">Dark elongated spots on</text>
    <text x="100" y="187" text-anchor="middle" class="label">fruit skin. Fungal infection.</text>
    <text x="100" y="200" text-anchor="middle" class="label" font-weight="bold" fill="#a01818">→ REJECT (Grade C at best)</text>
  </g>

  <!-- 2. Banana Weevil -->
  <g transform="translate(235,50)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <!-- Corm cross-section -->
    <ellipse cx="100" cy="110" rx="55" ry="50" fill="#e8d8a8" stroke="#8a6c40" stroke-width="2"/>
    <ellipse cx="100" cy="110" rx="35" ry="32" fill="#d4be7a" stroke="#8a6c40" stroke-width="1"/>
    <!-- Tunnels -->
    <g fill="#3a2410">
      <ellipse cx="80" cy="95" rx="8" ry="3"/>
      <ellipse cx="115" cy="105" rx="10" ry="3"/>
      <ellipse cx="90" cy="125" rx="7" ry="3"/>
      <ellipse cx="120" cy="130" rx="9" ry="4"/>
    </g>
    <text x="100" y="170" text-anchor="middle" class="stage">BANANA WEEVIL</text>
    <text x="100" y="187" text-anchor="middle" class="label">Tunnels in corm. Check</text>
    <text x="100" y="199" text-anchor="middle" class="label">base of harvested bunch.</text>
    <text x="100" y="215" text-anchor="middle" class="label" font-weight="bold" fill="#a01818">→ REJECT</text>
  </g>

  <!-- 3. Latex Stain -->
  <g transform="translate(450,50)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <!-- Latex stains -->
    <g fill="#5a3818" opacity="0.85">
      <path d="M 60 95 Q 70 105, 75 95 Q 80 110, 85 100 Z"/>
      <path d="M 95 115 Q 110 125, 118 115 Q 122 130, 128 120 Z"/>
      <path d="M 130 100 Q 140 112, 145 102 Q 148 115, 152 108 Z"/>
    </g>
    <text x="100" y="160" text-anchor="middle" class="stage">LATEX STAIN</text>
    <text x="100" y="180" text-anchor="middle" class="label">Brown/black sap marks</text>
    <text x="100" y="192" text-anchor="middle" class="label">from cut surfaces. Common.</text>
    <text x="100" y="208" text-anchor="middle" class="label" font-weight="bold" fill="#a08940">→ Grade C if heavy</text>
  </g>

  <!-- 4. Thrips Scarring -->
  <g transform="translate(665,50)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <!-- Scarring -->
    <g stroke="#8a5a25" stroke-width="1" fill="none">
      <path d="M 55 105 L 80 100"/>
      <path d="M 60 110 L 90 108"/>
      <path d="M 70 115 L 95 113"/>
      <path d="M 95 100 L 130 96"/>
      <path d="M 100 110 L 135 105"/>
      <path d="M 110 120 L 140 118"/>
    </g>
    <g fill="#a06820" opacity="0.6">
      <ellipse cx="75" cy="105" rx="4" ry="2"/>
      <ellipse cx="110" cy="115" rx="5" ry="2"/>
      <ellipse cx="125" cy="105" rx="4" ry="2"/>
    </g>
    <text x="100" y="160" text-anchor="middle" class="stage">THRIPS SCARRING</text>
    <text x="100" y="180" text-anchor="middle" class="label">Rusty linear scratches,</text>
    <text x="100" y="192" text-anchor="middle" class="label">rough skin texture.</text>
    <text x="100" y="208" text-anchor="middle" class="label" font-weight="bold" fill="#a08940">→ Grade B / C</text>
  </g>

  <!-- ============ Row 2 ============ -->

  <!-- 5. Mechanical Damage -->
  <g transform="translate(20,290)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <!-- Bruise -->
    <ellipse cx="85" cy="110" rx="22" ry="14" fill="#5a3018" opacity="0.6"/>
    <ellipse cx="85" cy="110" rx="18" ry="10" fill="#3a1808" opacity="0.5"/>
    <!-- Crack -->
    <path d="M 110 95 L 120 105 L 115 115 L 125 125" stroke="#3a1808" stroke-width="2" fill="none"/>
    <text x="100" y="160" text-anchor="middle" class="stage">MECHANICAL DAMAGE</text>
    <text x="100" y="180" text-anchor="middle" class="label">Cuts, bruises, broken skin</text>
    <text x="100" y="192" text-anchor="middle" class="label">from rough handling.</text>
    <text x="100" y="208" text-anchor="middle" class="label" font-weight="bold" fill="#a01818">→ REJECT if open wound</text>
  </g>

  <!-- 6. Sunscald -->
  <g transform="translate(235,290)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <!-- Bleached patch -->
    <ellipse cx="100" cy="105" rx="25" ry="12" fill="#e8e4b0" stroke="#a89c40" stroke-width="1"/>
    <text x="100" y="160" text-anchor="middle" class="stage">SUNSCALD</text>
    <text x="100" y="180" text-anchor="middle" class="label">Bleached/yellowed patch</text>
    <text x="100" y="192" text-anchor="middle" class="label">where sun hit exposed fruit.</text>
    <text x="100" y="208" text-anchor="middle" class="label" font-weight="bold" fill="#a08940">→ Grade B if small</text>
  </g>

  <!-- 7. Broken Crown -->
  <g transform="translate(450,290)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <!-- Broken crown -->
    <path d="M 50 90 L 40 85 L 35 95 L 25 90" stroke="#3a2410" stroke-width="2" fill="#5a3818"/>
    <path d="M 150 90 L 160 85 L 165 95 L 175 90" stroke="#3a2410" stroke-width="2" fill="#5a3818"/>
    <!-- Hanging tissue -->
    <path d="M 45 92 Q 35 105, 40 115" stroke="#5a3818" stroke-width="3" fill="none"/>
    <text x="100" y="160" text-anchor="middle" class="stage">BROKEN CROWN</text>
    <text x="100" y="180" text-anchor="middle" class="label">Stem end damaged/torn</text>
    <text x="100" y="192" text-anchor="middle" class="label">during harvest.</text>
    <text x="100" y="208" text-anchor="middle" class="label" font-weight="bold" fill="#a08940">→ Grade C</text>
  </g>

  <!-- 8. Disease symptoms (leaf → fruit) -->
  <g transform="translate(665,290)">
    <rect x="0" y="0" width="200" height="220" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <!-- Streaked pattern on fruit -->
    <ellipse cx="100" cy="110" rx="60" ry="30" fill="#a8c84a" stroke="#3e5a1f" stroke-width="1.5"/>
    <g stroke="#5a4818" stroke-width="1.5" fill="none">
      <path d="M 60 100 Q 70 95, 75 105"/>
      <path d="M 75 115 Q 85 110, 95 118"/>
      <path d="M 100 100 Q 110 105, 118 100"/>
      <path d="M 120 115 Q 130 110, 140 118"/>
    </g>
    <!-- Yellow streak -->
    <path d="M 65 105 Q 100 110, 140 105" stroke="#d4c060" stroke-width="3" fill="none" opacity="0.7"/>
    <text x="100" y="160" text-anchor="middle" class="stage">BSV / STREAK VIRUS</text>
    <text x="100" y="180" text-anchor="middle" class="label">Streaked patterns on skin,</text>
    <text x="100" y="192" text-anchor="middle" class="label">viral, untreatable.</text>
    <text x="100" y="208" text-anchor="middle" class="label" font-weight="bold" fill="#a01818">→ REJECT entire plant</text>
  </g>
</svg>