<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .title { font-family: Georgia, serif; font-size: 14px; font-weight: bold; fill: #3e5a1f; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #3e5a1f; }
      .desc { font-family: Helvetica, Arial, sans-serif; font-size: 9px; fill: #5d4a2e; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="title">FIELD TOOLKIT — EVERY VISIT</text>
  <text x="400" y="38" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5d4a2e" font-style="italic">Pack these. Verify before departure.</text>

  <!-- 1. Calibrated Scale -->
  <g transform="translate(30,60)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <!-- Scale platform -->
    <rect x="35" y="60" width="100" height="14" fill="#5d4a2e" stroke="#3a2410" stroke-width="1"/>
    <!-- Display unit -->
    <rect x="55" y="30" width="60" height="30" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1" rx="2"/>
    <rect x="60" y="35" width="50" height="20" fill="#88c070"/>
    <text x="85" y="49" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="#1a3a08" font-weight="bold">0.00kg</text>
    <!-- Hook indicator -->
    <circle cx="85" cy="74" r="3" fill="#888"/>
    <text x="85" y="98" text-anchor="middle" class="label">CALIBRATED SCALE</text>
    <text x="85" y="112" text-anchor="middle" class="desc">200 kg min, ±0.1 kg</text>
    <text x="85" y="122" text-anchor="middle" class="desc">Charge &amp; zero-check daily</text>
  </g>

  <!-- 2. Harvest Knife -->
  <g transform="translate(220,60)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <!-- Blade -->
    <path d="M 30 65 L 100 50 L 110 60 L 30 75 Z" fill="#c8c8d8" stroke="#5a5a6a" stroke-width="1"/>
    <!-- Handle -->
    <rect x="105" y="48" width="40" height="14" fill="#5d3a18" stroke="#3a2410" stroke-width="1" rx="2"/>
    <text x="40" y="100" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5d4a2e" font-weight="bold">Panga /</text>
    <text x="40" y="112" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5d4a2e" font-weight="bold">Harvest knife</text>
    <text x="40" y="125" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#5d4a2e">Sharp + sheath</text>
  </g>

  <!-- 3. Gloves -->
  <g transform="translate(410,60)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <!-- Glove silhouette -->
    <path d="M 60 30 L 60 100 M 75 30 L 75 95 M 90 25 L 90 95 M 105 30 L 105 100 M 115 35 L 115 100 M 60 100 Q 55 110, 60 115 L 115 115 Q 120 110, 115 100"
          stroke="#c4baa0" stroke-width="1" fill="none"/>
    <!-- Palm fill -->
    <path d="M 58 30 L 58 100 Q 53 110, 58 118 L 117 118 Q 122 110, 117 100 L 117 30 Q 110 35, 100 30 Q 90 25, 80 30 Q 70 35, 58 30 Z"
          fill="#e8d8a8" stroke="#8a6c40" stroke-width="1.5"/>
    <text x="85" y="98" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5d4a2e" font-weight="bold">GLOVES</text>
    <text x="85" y="112" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#5d4a2e">Latex stain hides</text>
    <text x="85" y="122" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#5d4a2e">defects. Bare hand ok.</text>
  </g>

  <!-- 4. Phone -->
  <g transform="translate(600,60)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <rect x="60" y="20" width="50" height="90" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1" rx="6"/>
    <rect x="65" y="28" width="40" height="68" fill="#5d8ac4"/>
    <rect x="65" y="28" width="40" height="68" fill="#f0f0f0" opacity="0.4"/>
    <text x="85" y="48" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#1a3a08" font-weight="bold">POP APP</text>
    <text x="85" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#1a3a08">Buy • Grade</text>
    <text x="85" y="72" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#1a3a08">Price • Photo</text>
    <circle cx="85" cy="103" r="3" fill="none" stroke="#888" stroke-width="1"/>
    <text x="85" y="125" text-anchor="middle" class="label">PHONE + POP APP</text>
  </g>

  <!-- Row 2 -->

  <!-- 5. Record form / notebook -->
  <g transform="translate(30,210)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <rect x="40" y="30" width="100" height="80" fill="#f5e8b8" stroke="#5d3a18" stroke-width="1.5"/>
    <line x1="50" y1="48" x2="130" y2="48" stroke="#8a6c40" stroke-width="0.5"/>
    <line x1="50" y1="58" x2="130" y2="58" stroke="#8a6c40" stroke-width="0.5"/>
    <line x1="50" y1="68" x2="130" y2="68" stroke="#8a6c40" stroke-width="0.5"/>
    <line x1="50" y1="78" x2="130" y2="78" stroke="#8a6c40" stroke-width="0.5"/>
    <line x1="50" y1="88" x2="130" y2="88" stroke="#8a6c40" stroke-width="0.5"/>
    <line x1="50" y1="98" x2="130" y2="98" stroke="#8a6c40" stroke-width="0.5"/>
    <rect x="40" y="30" width="14" height="80" fill="#a01818"/>
    <text x="85" y="125" text-anchor="middle" class="label">PAPER FALLBACK</text>
  </g>

  <!-- 6. Tarpaulin / groundsheet -->
  <g transform="translate(220,210)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <path d="M 30 50 L 145 35 L 150 105 L 35 110 Z" fill="#4a8a3a" stroke="#2a5a1a" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="148" y2="50" stroke="#6ba85a" stroke-width="0.5"/>
    <line x1="40" y1="75" x2="148" y2="65" stroke="#6ba85a" stroke-width="0.5"/>
    <line x1="40" y1="90" x2="148" y2="80" stroke="#6ba85a" stroke-width="0.5"/>
    <text x="85" y="125" text-anchor="middle" class="label">GROUND TARP</text>
  </g>

  <!-- 7. Sample bags -->
  <g transform="translate(410,210)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <path d="M 50 35 L 65 30 L 100 30 L 115 35 L 115 95 L 100 105 L 65 105 L 50 95 Z" fill="#e8e0c8" stroke="#5d4a2e" stroke-width="1.5"/>
    <ellipse cx="82" cy="30" rx="25" ry="3" fill="#5d4a2e"/>
    <text x="82" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5d4a2e" font-weight="bold">SAMPLE</text>
    <text x="82" y="82" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5d4a2e" font-weight="bold">BAGS (×3)</text>
    <text x="85" y="125" text-anchor="middle" class="label">FOR DISPUTES</text>
  </g>

  <!-- 8. First-aid + water -->
  <g transform="translate(600,210)">
    <rect x="0" y="0" width="170" height="130" fill="#fbf6e8" stroke="#a89c40" stroke-width="1.5" rx="4"/>
    <rect x="30" y="35" width="50" height="35" fill="#c83030" stroke="#5a1010" stroke-width="1.5" rx="2"/>
    <rect x="50" y="42" width="10" height="20" fill="#fff"/>
    <rect x="45" y="48" width="20" height="8" fill="#fff"/>
    <ellipse cx="115" cy="55" rx="20" ry="25" fill="#a8c8e0" stroke="#5a7894" stroke-width="1.5"/>
    <ellipse cx="115" cy="30" rx="6" ry="3" fill="#5a7894"/>
    <text x="85" y="95" text-anchor="middle" class="label">FIRST AID + WATER</text>
    <text x="85" y="110" text-anchor="middle" class="desc">Plantation injuries, dehydration</text>
    <text x="85" y="120" text-anchor="middle" class="desc">Latrine at farm? Plan ahead.</text>
  </g>
</svg>