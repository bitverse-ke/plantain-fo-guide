<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .step-num { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #fff; }
      .step-title { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #3e5a1f; }
      .step-desc { font-family: Helvetica, Arial, sans-serif; font-size: 9px; fill: #5d4a2e; }
      .arrow { fill: none; stroke: #6b8932; stroke-width: 2; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b8932"/>
    </marker>
  </defs>

  <!-- Step 1: Pre-call -->
  <g transform="translate(20,40)">
    <circle cx="40" cy="40" r="32" fill="#6b8932"/>
    <text x="40" y="48" text-anchor="middle" class="step-num">1</text>
    <text x="40" y="95" text-anchor="middle" class="step-title">PRE-CALL</text>
    <text x="40" y="112" text-anchor="middle" class="step-desc">Confirm signal,</text>
    <text x="40" y="124" text-anchor="middle" class="step-desc">pull daily price,</text>
    <text x="40" y="136" text-anchor="middle" class="step-desc">pack tools</text>
  </g>

  <path d="M 100 80 L 130 80" class="arrow" marker-end="url(#ah)"/>

  <!-- Step 2: At Farm -->
  <g transform="translate(140,40)">
    <circle cx="40" cy="40" r="32" fill="#6b8932"/>
    <text x="40" y="48" text-anchor="middle" class="step-num">2</text>
    <text x="40" y="95" text-anchor="middle" class="step-title">AT FARM</text>
    <text x="40" y="112" text-anchor="middle" class="step-desc">Rapport, ID check,</text>
    <text x="40" y="124" text-anchor="middle" class="step-desc">walk plantation,</text>
    <text x="40" y="136" text-anchor="middle" class="step-desc">count bunches</text>
  </g>

  <path d="M 220 80 L 250 80" class="arrow" marker-end="url(#ah)"/>

  <!-- Step 3: Sample & Grade -->
  <g transform="translate(260,40)">
    <circle cx="40" cy="40" r="32" fill="#6b8932"/>
    <text x="40" y="48" text-anchor="middle" class="step-num">3</text>
    <text x="40" y="95" text-anchor="middle" class="step-title">SAMPLE &amp; GRADE</text>
    <text x="40" y="112" text-anchor="middle" class="step-desc">Pick 3+ sample bunches,</text>
    <text x="40" y="124" text-anchor="middle" class="step-desc">inspect fingers,</text>
    <text x="40" y="136" text-anchor="middle" class="step-desc">assign A/B/C</text>
  </g>

  <path d="M 340 80 L 370 80" class="arrow" marker-end="url(#ah)"/>

  <!-- Step 4: Negotiate -->
  <g transform="translate(380,40)">
    <circle cx="40" cy="40" r="32" fill="#6b8932"/>
    <text x="40" y="48" text-anchor="middle" class="step-num">4</text>
    <text x="40" y="95" text-anchor="middle" class="step-title">NEGOTIATE</text>
    <text x="40" y="112" text-anchor="middle" class="step-desc">Price within ±5%</text>
    <text x="40" y="124" text-anchor="middle" class="step-desc">of daily reference,</text>
    <text x="40" y="136" text-anchor="middle" class="step-desc">volume bonus if any</text>
  </g>

  <path d="M 460 80 L 490 80" class="arrow" marker-end="url(#ah)"/>

  <!-- Step 5: Weigh & Record -->
  <g transform="translate(500,40)">
    <circle cx="40" cy="40" r="32" fill="#6b8932"/>
    <text x="40" y="48" text-anchor="middle" class="step-num">5</text>
    <text x="40" y="95" text-anchor="middle" class="step-title">WEIGH &amp; RECORD</text>
    <text x="40" y="112" text-anchor="middle" class="step-desc">Net weight, photo,</text>
    <text x="40" y="124" text-anchor="middle" class="step-desc">SMS confirm,</text>
    <text x="40" y="136" text-anchor="middle" class="step-desc">outgrower signature</text>
  </g>

  <path d="M 580 80 L 610 80" class="arrow" marker-end="url(#ah)"/>

  <!-- Step 6: Harvest & Load -->
  <g transform="translate(620,40)">
    <circle cx="40" cy="40" r="32" fill="#6b8932"/>
    <text x="40" y="48" text-anchor="middle" class="step-num">6</text>
    <text x="40" y="95" text-anchor="middle" class="step-title">HARVEST &amp; LOAD</text>
    <text x="40" y="112" text-anchor="middle" class="step-desc">Drain latex 15 min,</text>
    <text x="40" y="124" text-anchor="middle" class="step-desc">gentle handling,</text>
    <text x="40" y="136" text-anchor="middle" class="step-desc">transport</text>
  </g>

  <!-- Bottom callout -->
  <rect x="20" y="170" width="860" height="38" fill="#e8f0d4" stroke="#6b8932" stroke-width="1.5" rx="4"/>
  <text x="450" y="190" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#3e5a1f" font-weight="bold">
    Average visit: 45–90 minutes per outgrower • Drive cycle: 3–5 farms per day
  </text>
  <text x="450" y="203" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#5d4a2e" font-style="italic">
    If any step stalls &gt; 10 minutes, log it in the app and escalate to supervisor.
  </text>
</svg>